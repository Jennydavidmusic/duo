<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking Confirmation</title>

<style>
body {
  background:#000;
  color:#fff;
  font-family:Arial;
  padding:20px;
}
.container {
  max-width:600px;
  margin:auto;
}
input, textarea {
  width:100%;
  padding:12px;
  margin:8px 0;
  background:#111;
  border:1px solid #444;
  color:#fff;
}
button {
  width:100%;
  padding:15px;
  background:gold;
  border:none;
  font-weight:bold;
  cursor:pointer;
}
.booking {
  border:1px solid #444;
  padding:10px;
  margin:10px 0;
}
</style>
</head>

<body>

<div class="container">

<h2>Confirm your booking</h2>

<div id="bookingDetails"></div>

<form id="form">

<input type="text" id="name" placeholder="Name" required>
<input type="email" id="email" placeholder="Email" required>

<textarea id="notes" placeholder="Notes (optional)"></textarea>

<label>
<input type="checkbox" required>
 I agree to the terms (cancellation policy applies)
</label>

<button type="submit">Confirm Booking</button>

</form>

</div>

<script>

const params = new URLSearchParams(window.location.search);

const venue = params.get("venue");
const items = params.get("items");

const bookingDiv = document.getElementById("bookingDetails");

if(items){
  const list = items.split(",");
  list.forEach(item=>{
    const [date,time,price] = item.split("|");
    bookingDiv.innerHTML += `
      <div class="booking">
        <b>${date}</b><br>
        ${time}<br>
        £${price}
      </div>
    `;
  });
}

document.getElementById("form").addEventListener("submit", function(e){

  e.preventDefault();

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;

  const formData = new FormData();

  // 🔥 IMPORTANT
  formData.append("_subject", "[BOOKING] New booking confirmation - " + venue);

  formData.append("name", name);
  formData.append("email", email);
  formData.append("venue", venue);
  formData.append("items", items);

  // 🔥 FIX CLIENT EMAIL
  formData.append("_replyto", email);
  formData.append("_cc", email);

  fetch("https://formspree.io/f/xbdplwvk", {
    method: "POST",
    body: formData,
    headers: {
      'Accept': 'application/json'
    }
  })
  .then(response => {
    if(response.ok){
      alert("Booking confirmed!");
    } else {
      alert("Error, try again");
    }
  });

});

</script>

</body>
</html>
