<style>
  *,
  *::before,
  *::after {
    box-sizing: border-box;
  }

  body {
    background-color: #111;
    color: #fff;
    font-family: 'Segoe UI', Arial, sans-serif;
    margin: 0;
    padding: 20px;
    overflow-x: hidden;
  }

  h1 {
    text-align: center;
    margin: 0 0 24px;
    color: #fff;
    font-size: clamp(1.7rem, 4vw, 2.5rem);
    line-height: 1.2;
  }

  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 15px;
    width: min(1500px, 100%);
    margin: 100px auto 0;
  }

  .gallery-item {
    position: relative;
    aspect-ratio: 1 / 1;
    overflow: hidden;
    background: #050505;
    border-radius: 8px;
    cursor: pointer;
    isolation: isolate;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .gallery img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: inherit;
    transition: transform 0.35s ease, object-position 0.35s ease;
  }

  /* Sur ordinateur : la vignette s'agrandit et la photo entière devient visible. */
  @media (hover: hover) and (pointer: fine) {
    .gallery-item:hover {
      z-index: 20;
      transform: scale(1.07);
      box-shadow: 0 14px 35px rgba(0, 0, 0, 0.65);
    }

    .gallery-item:hover img {
      object-fit: contain;
      transform: scale(0.96);
    }
  }

  #fullscreen-overlay {
    display: none;
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    padding: 24px;
    background: rgba(0, 0, 0, 0.95);
    z-index: 9999;
    justify-content: center;
    align-items: center;
    cursor: zoom-out;
  }

  #fullscreen-overlay img {
    display: block;
    max-width: 94vw;
    max-height: 90vh;
    width: auto;
    height: auto;
    object-fit: contain;
    border-radius: 12px;
  }

  #fullscreen-overlay.active {
    display: flex;
  }

  #fullscreen-overlay::after {
    content: '×';
    position: absolute;
    top: max(12px, env(safe-area-inset-top));
    right: max(18px, env(safe-area-inset-right));
    color: #fff;
    font-size: 3rem;
    line-height: 1;
    cursor: pointer;
  }

  @media (max-width: 900px) {
    body {
      padding: 14px;
    }

    .gallery {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 82px;
    }
  }

  @media (max-width: 520px) {
    body {
      padding: 10px;
    }

    h1 {
      margin-bottom: 16px;
    }

    .gallery {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 70px;
    }

    .gallery-item {
      border-radius: 6px;
    }

    #fullscreen-overlay {
      padding: 12px;
    }

    #fullscreen-overlay img {
      max-width: 96vw;
      max-height: 86vh;
      border-radius: 8px;
    }
  }

  @media (max-width: 340px) {
    .gallery {
      grid-template-columns: 1fr;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    .gallery-item,
    .gallery img {
      transition: none;
    }
  }
</style>

<script>
  // FULLSCREEN
  const galleryImages = document.querySelectorAll('.gallery img');
  const fullscreenOverlay = document.getElementById('fullscreen-overlay');
  const fullscreenImage = document.getElementById('fullscreen-image');

  galleryImages.forEach(img => {
    img.addEventListener('click', () => {
      fullscreenImage.src = img.src;
      fullscreenOverlay.classList.add('active');
    });
  });

  function closeFullscreen() {
    fullscreenOverlay.classList.remove('active');
    fullscreenImage.src = '';
  }

  // HAMBURGER LOGIC
  const menuButton = document.querySelector('.hamburger-icon');
  const mobileMenu = document.getElementById('hamburgerNav');

  menuButton.addEventListener('click', function (e) {
    e.stopPropagation();
    mobileMenu.classList.toggle('show');
    this.textContent = mobileMenu.classList.contains('show') ? '✖' : '☰';
  });

  mobileMenu.addEventListener('click', function (e) {
    e.stopPropagation();
  });

  document.addEventListener('click', function () {
    if (mobileMenu.classList.contains('show')) {
      mobileMenu.classList.remove('show');
      menuButton.textContent = '☰';
    }
  });
  window.addEventListener("scroll", () => {
  if (mobileMenu.classList.contains("show")) {
    mobileMenu.classList.remove("show");
    menuButton.textContent = "☰";
  }
});

</script>
