<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Jenny & David Music</title>

<style>
body {
  background-color: #000;
  color: #D4AF37;
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  padding: 20px;
}

.music-section {
  text-align: center;
  margin: 40px auto;
}

.video-wrapper {
  position: relative;
  width: 100%;
  height: 0;
  padding-bottom: 56.25%;
  overflow: hidden;
  border-radius: 12px;
}

.video-wrapper iframe,
.video-wrapper .embed-box {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

.short-youtube {
  padding-bottom: 177.78%;
  max-width: 320px;
  margin: auto;
}

.video-mosaic {
  display: flex;
  flex-direction: column;
  gap: 20px;
  max-width: 900px;
  margin: 20px auto;
}

.embed-box {
  display:flex;
  align-items:center;
  justify-content:center;
  border:1px solid rgba(212,175,55,0.6);
  border-radius:12px;
  background:#111;
}

.embed-accept{
  padding:10px 14px;
  border-radius:10px;
  border:1px solid rgba(212,175,55,0.6);
  background: rgba(212,175,55,0.18);
  color:#fff;
  font-weight:800;
  cursor:pointer;
}

@media (min-width: 769px) {
  .video-mosaic {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 25px;
    align-items: start;
  }

  .video-wrapper {
    margin: 0;
  }

  .short-youtube {
    max-width: 260px;
    justify-self: center;
  }
}
</style>
</head>

<body>

<div class="music-section">
<h1>Listen to Jenny & David – Live Music Duo Performing in London</h1>

<div class="video-mosaic">

<div class="video-wrapper">
  <iframe src="https://www.youtube.com/embed/rgNG6-iYWKo"
  title="Jenny & David Live"
  allowfullscreen></iframe>
</div>

<div class="video-wrapper">
  <iframe src="https://www.youtube.com/embed/QPFZwry92j0"
  title="Jenny & David Live"
  allowfullscreen></iframe>
</div>

<div class="video-wrapper short-youtube">
  <iframe src="https://www.youtube.com/embed/6yZOedVUP7g"
  title="Jenny & David Short"
  allowfullscreen></iframe>
</div>

<div class="video-wrapper short-youtube">
  <iframe src="https://www.youtube.com/embed/0FFUORUmZvU"
  title="Jenny & David Short"
  allowfullscreen></iframe>
</div>

</div>
</div>

</body>
</html>
