<script>
const nav = document.getElementById('hamburgerNav');
const btn = document.querySelector('.hamburger-icon');

function toggleMenu() {
  nav.classList.toggle('show');
  btn.textContent = nav.classList.contains('show') ? '✖' : '☰';
}

document.addEventListener('click', (e) => {
  if (!nav.contains(e.target) && !btn.contains(e.target)) {
    nav.classList.remove('show');
    btn.textContent = '☰';
  }
});

window.addEventListener("scroll", () => {
  if (nav.classList.contains("show")) {
    nav.classList.remove("show");
    btn.textContent = "☰";
  }
});

</script>

<script>
document.addEventListener("DOMContentLoaded", () => {
  document.querySelectorAll('.embed-box[data-yt-id]').forEach(box => {
    box.addEventListener('click', () => {
      const ytId = box.dataset.ytId;

      const iframe = document.createElement('iframe');
      iframe.src = `https://www.youtube.com/embed/${ytId}?autoplay=1`;
      iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share";
      iframe.allowFullscreen = true;

      box.innerHTML = '';
      box.appendChild(iframe);
    }, { once: true });
  });
});
</script>
