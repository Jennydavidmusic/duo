.gallery {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
    margin-top:100px;
    overflow:visible;
}

.gallery-item{
    aspect-ratio:1/1;
    position:relative;
    overflow:visible;
    cursor:pointer;
    z-index:1;
    isolation:isolate;
}

.gallery-item img{
    display:block;
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:8px;
}

/* Copie complète de la photo, affichée au-dessus sans modifier la vignette */
.gallery-item::after{
    content:"";
    position:absolute;
    inset:0;
    border-radius:8px;
    background-image:var(--preview-image);
    background-position:center;
    background-repeat:no-repeat;
    background-size:contain;
    background-color:#111;
    box-shadow:0 18px 40px rgba(0,0,0,.45);
    opacity:0;
    transform:scale(.94);
    transition:
        opacity .22s ease,
        transform .34s cubic-bezier(.2,.75,.25,1);
    pointer-events:none;
    will-change:transform,opacity;
    z-index:2;
}

@media (hover:hover) and (pointer:fine){
    .gallery-item:hover{
        z-index:999;
    }

    .gallery-item:hover::after{
        opacity:1;
        transform:scale(1.35);
    }
}

@media (hover:none), (pointer:coarse){
    .gallery-item.mobile-active{
        z-index:999;
    }

    .gallery-item.mobile-active::after{
        opacity:1;
        transform:scale(1.16);
    }
}

#fullscreen-overlay {

    position: absolute;
    top: 20px;
    right: 30px;
    color: white;
    font-size: 3rem;
    cursor: pointer;
  }

<script>
  // FULLSCREEN
  const galleryImages = document.querySelectorAll('.gallery img');
  const fullscreenOverlay = document.getElementById('fullscreen-overlay');
  const fullscreenImage = document.getElementById('fullscreen-image');

  galleryImages.forEach(img => {
    img.addEventListener('click', () => {
      fullscreenImage.src = img.src;
      fullscreenOverlay.classList.add('active');
    });
  });

  function closeFullscreen() {
    fullscreenOverlay.classList.remove('active');
    fullscreenImage.src = '';
  }

  // HAMBURGER LOGIC
  const menuButton = document.querySelector('.hamburger-icon');
  const mobileMenu = document.getElementById('hamburgerNav');

  menuButton.addEventListener('click', function (e) {
    e.stopPropagation();
    mobileMenu.classList.toggle('show');
    this.textContent = mobileMenu.classList.contains('show') ? '✖' : '☰';
  });

  mobileMenu.addEventListener('click', function (e) {
    e.stopPropagation();
  });

  document.addEventListener('click', function () {
    if (mobileMenu.classList.contains('show')) {
      mobileMenu.classList.remove('show');
      menuButton.textContent = '☰';
    }
  });
  window.addEventListener("scroll", () => {
  if (mobileMenu.classList.contains("show")) {
    mobileMenu.classList.remove("show");
    menuButton.textContent = "☰";
  }
});

  // APERÇU MOBILE FLUIDE AU CENTRE DE L’ÉCRAN
  const galleryItems = Array.from(document.querySelectorAll('.gallery-item'));
  const isTouchDevice = window.matchMedia('(hover: none), (pointer: coarse)').matches;

  // Prépare la copie complète de chaque image sans changer object-fit pendant le scroll.
  galleryItems.forEach(item => {
    const image = item.querySelector('img');
    if (image) {
      item.style.setProperty('--preview-image', `url("${image.src}")`);
    }
  });

  if ('IntersectionObserver' in window && isTouchDevice) {
    let activeItem = null;
    let ticking = false;

    const chooseClosestItem = () => {
      ticking = false;

      const viewportCenter = window.innerHeight / 2;
      let closestItem = null;
      let closestDistance = Infinity;

      galleryItems.forEach(item => {
        const rect = item.getBoundingClientRect();
        const visible = rect.bottom > 0 && rect.top < window.innerHeight;

        if (!visible) return;

        const itemCenter = rect.top + rect.height / 2;
        const distance = Math.abs(itemCenter - viewportCenter);

        if (distance < closestDistance) {
          closestDistance = distance;
          closestItem = item;
        }
      });

      // Activation seulement dans une zone centrale assez large pour éviter les bascules rapides.
      const activationZone = window.innerHeight * 0.30;

      if (closestItem && closestDistance < activationZone) {
        if (activeItem !== closestItem) {
          if (activeItem) activeItem.classList.remove('mobile-active');
          closestItem.classList.add('mobile-active');
          activeItem = closestItem;
        }
      } else if (activeItem) {
        activeItem.classList.remove('mobile-active');
        activeItem = null;
      }
    };

    const requestUpdate = () => {
      if (!ticking) {
        ticking = true;
        requestAnimationFrame(chooseClosestItem);
      }
    };

    const observer = new IntersectionObserver(requestUpdate, {
      threshold: [0, 0.25, 0.5, 0.75, 1],
      rootMargin: '18% 0px 18% 0px'
    });

    galleryItems.forEach(item => observer.observe(item));
    window.addEventListener('scroll', requestUpdate, { passive: true });
    window.addEventListener('resize', requestUpdate, { passive: true });
    requestUpdate();
  }

</script>
